<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - Canada P.J Media</title>
  <link rel="stylesheet" href="../styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="../logo.png" alt="Canada P.J Media" onerror="this.style.display='none'"/>
      <div class="brand-text" style="text-align:center;margin-top:8px">
        <span class="brand-main">Canada P.J Media</span>
        <span class="brand-sub">Academic Media Hub</span>
      </div>
    </div>

    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your Canada P.J account</p>

    <div id="loginAlert" class="alert alert-error hidden">
      <i class="fas fa-exclamation-circle"></i> <span id="loginAlertMsg">Invalid credentials.</span>
    </div>
    <div id="loginSuccess" class="alert alert-success hidden">
      <i class="fas fa-check-circle"></i> Login successful! Redirecting...
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="your@email.com" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter password" required/>
          <span class="toggle-pw" onclick="togglePw('loginPassword',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-light)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:0.82rem;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:500;color:var(--text-mid)">
          <input type="checkbox" style="width:auto;margin:0"/> Remember me
        </label>
        <a href="#" style="color:var(--blue-primary);text-decoration:none;font-weight:600">Forgot password?</a>
      </div>
      <button type="submit" class="form-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </form>

    <div class="form-divider">or</div>

    <p class="auth-links">
      Don't have an account? <a href="register.html">Create Account</a>
    </p>
    <p class="auth-links" style="margin-top:8px">
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
    </p>
  </div>
</div>

<script>
function togglePw(id, el) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; el.innerHTML = '<i class="fas fa-eye-slash"></i>'; }
  else { inp.type = 'password'; el.innerHTML = '<i class="fas fa-eye"></i>'; }
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  const alertBox = document.getElementById('loginAlert');
  const alertMsg = document.getElementById('loginAlertMsg');
  const successBox = document.getElementById('loginSuccess');

  alertBox.classList.add('hidden');
  successBox.classList.add('hidden');

  // Load users from localStorage
  const users = JSON.parse(localStorage.getItem('cpj_users') || '[]');
  const user = users.find(u => u.email === email && u.password === pass);

  if (user) {
    localStorage.setItem('cpj_current_user', JSON.stringify(user));
    successBox.classList.remove('hidden');
    setTimeout(() => {
      if (user.role === 'admin') window.location.href = '../admin/dashboard.html';
      else window.location.href = '../dashboard.html';
    }, 1200);
  } else {
    alertMsg.textContent = 'Invalid email or password. Please try again.';
    alertBox.classList.remove('hidden');
  }
}

// Create default admin on first load
(function() {
  const users = JSON.parse(localStorage.getItem('cpj_users') || '[]');
  const adminExists = users.find(u => u.role === 'admin');
  if (!adminExists) {
    users.push({
      id: 'admin_001',
      name: 'Academic Media Hub',
      email: 'admin@canadapjmedia.com',
      password: 'CanadaPJ@Admin2025',
      role: 'admin',
      referralCode: 'ADMIN001',
      joined: new Date().toISOString()
    });
    localStorage.setItem('cpj_users', JSON.stringify(users));
  }
})();
</script>
</body>
</html>
